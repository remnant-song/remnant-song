<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #fafafa;
        --alpha-base: 0.85;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg-color: #111827; }
      }
      
      .bg-rect { fill: var(--bg-color); transition: fill 0.5s ease; }
      .anim-element { will-change: transform; }

      /* 背景线框动画 */
      @keyframes floatSpline1 { 0%, 100% { transform: translateY(0px) scale(1) rotate(0deg); } 50% { transform: translateY(-30px) scale(1.02) rotate(1deg); } }
      @keyframes floatSpline2 { 0%, 100% { transform: translateY(0px) scale(1) rotate(0deg); } 50% { transform: translateY(40px) scale(0.98) rotate(-1deg); } }
      @keyframes floatSpline3 { 0%, 100% { transform: translateY(0px) scale(1) rotate(0deg); } 50% { transform: translateY(-20px) scale(1.05) rotate(0.5deg); } }
      @keyframes spinFloat1 { 0% { transform: translate(0, 0) rotate(0deg) scale(1); } 33% { transform: translate(40px, -60px) rotate(120deg) scale(1.1); } 66% { transform: translate(-30px, 40px) rotate(240deg) scale(0.9); } 100% { transform: translate(0, 0) rotate(360deg) scale(1); } }
      @keyframes spinFloat2 { 0% { transform: translate(0, 0) rotate(0deg) scale(1); } 33% { transform: translate(-50px, 30px) rotate(-120deg) scale(0.9); } 66% { transform: translate(40px, -50px) rotate(-240deg) scale(1.1); } 100% { transform: translate(0, 0) rotate(-360deg) scale(1); } }
      @keyframes spinFloat3 { 0% { transform: translate(0, 0) rotate(0deg); } 50% { transform: translate(80px, 80px) rotate(180deg); } 100% { transform: translate(0, 0) rotate(360deg); } }

      /* ====================================== */
      /* 🔥 艺术标题专属动画 (替代 Vue 中的 .animate-letter) */
      /* ====================================== */
      .animate-letter {
        opacity: 0;
        fill-opacity: 0;
        stroke-dasharray: 800;
        stroke-dashoffset: 800;
        /* 为了在各个设备上渲染更稳定，去除了 transform: translateY 效果，专注描边和渐隐 */
        animation: writing 2.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      }

      @keyframes writing {
        0% { opacity: 0; fill-opacity: 0; stroke-dashoffset: 800; }
        30% { opacity: 1; stroke-dashoffset: 800; fill-opacity: 0; }
        70% { stroke-dashoffset: 0; fill-opacity: 0; }
        100% { opacity: 1; fill-opacity: 1; stroke-dashoffset: 0; }
      }
    </style>

    <filter id="radialBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
    </filter>
    <radialGradient id="blurMaskGradient" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/> <stop offset="40%" stop-color="#fff" stop-opacity="0.8"/> <stop offset="70%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <mask id="maskForBlurLayer">
      <rect width="100%" height="100%" fill="url(#blurMaskGradient)"/>
    </mask>
    <radialGradient id="clearMaskGradient" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/> <stop offset="40%" stop-color="#fff" stop-opacity="0.2"/> <stop offset="70%" stop-color="#fff" stop-opacity="1"/>
    </radialGradient>
    <mask id="maskForClearLayer">
      <rect width="100%" height="100%" fill="url(#clearMaskGradient)"/>
    </mask>

    <filter id="filter-crayon" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
      <feGaussianBlur stdDeviation="0.4" />
    </filter>

    <linearGradient id="text-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" /> <stop offset="100%" stop-color="#D97706" />
    </linearGradient>
    <linearGradient id="text-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" /> <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="text-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9A8D4" /> <stop offset="100%" stop-color="#DB2777" />
    </linearGradient>
    <linearGradient id="text-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67E8F9" /> <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>

    <linearGradient id="grad-spline1" x1="0%" y1="0%" x2="100%" y2="0%"> <stop offset="0%" stop-color="#FF3366" /> <stop offset="100%" stop-color="#9933FF" /> </linearGradient>
    <linearGradient id="grad-spline2" x1="0%" y1="0%" x2="100%" y2="0%"> <stop offset="0%" stop-color="#00E5FF" /> <stop offset="100%" stop-color="#00FF7F" /> </linearGradient>
    <linearGradient id="grad-spline3" x1="0%" y1="0%" x2="100%" y2="0%"> <stop offset="0%" stop-color="#FFB100" /> <stop offset="100%" stop-color="#FF0055" /> </linearGradient>
    <linearGradient id="grad-shape1" x1="0%" y1="0%" x2="100%" y2="100%"> <stop offset="0%" stop-color="#7B2CBF" /> <stop offset="100%" stop-color="#390099" /> </linearGradient>
    <linearGradient id="grad-shape2" x1="0%" y1="0%" x2="100%" y2="100%"> <stop offset="0%" stop-color="#FF9E00" /> <stop offset="100%" stop-color="#FF5400" /> </linearGradient>

    <g id="wire-cube" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"> <polygon points="-25,-25 25,-25 25,25 -25,25" /> <polygon points="-12,-37 38,-37 38,13 -12,13" /> <line x1="-25" y1="-25" x2="-12" y2="-37" /> <line x1="25" y1="-25" x2="38" y2="-37" /> <line x1="25" y1="25" x2="38" y2="13" /> <line x1="-25" y1="25" x2="-12" y2="13" /> </g>
    <g id="wire-tetra" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"> <polygon points="0,-35 -30,18 30,18" /> <line x1="0" y1="-35" x2="0" y2="5" /> <line x1="-30" y1="18" x2="0" y2="5" /> <line x1="30" y1="18" x2="0" y2="5" /> </g>
    <path id="spline1" d="M -100 300 Q 200 150, 500 350 T 1300 200" fill="none" stroke="url(#grad-spline1)" stroke-width="2"/>
    <path id="spline2" d="M -100 450 Q 300 600, 700 350 T 1300 450" fill="none" stroke="url(#grad-spline2)" stroke-width="2"/>
    <path id="spline3" d="M -100 150 Q 400 -50, 800 250 T 1300 100" fill="none" stroke="url(#grad-spline3)" stroke-width="2"/>

    <g id="all-graphics">
      <g style="animation: floatSpline1 15s infinite ease-in-out;"> <use href="#spline1" style="opacity: 0.1; animation: floatSpline1 15s infinite ease-in-out; animation-delay: -0.6s;" /> <use href="#spline1" style="opacity: 0.3; animation: floatSpline1 15s infinite ease-in-out; animation-delay: -0.3s;" /> <use href="#spline1" style="opacity: 0.85;" /> </g>
      <g style="animation: floatSpline2 18s infinite ease-in-out;"> <use href="#spline2" style="opacity: 0.1; animation: floatSpline2 18s infinite ease-in-out; animation-delay: -0.8s;" /> <use href="#spline2" style="opacity: 0.3; animation: floatSpline2 18s infinite ease-in-out; animation-delay: -0.4s;" /> <use href="#spline2" style="opacity: 0.85;" /> </g>
      <g style="animation: floatSpline3 12s infinite ease-in-out;"> <use href="#spline3" style="opacity: 0.1; animation: floatSpline3 12s infinite ease-in-out; animation-delay: -0.5s;" /> <use href="#spline3" style="opacity: 0.3; animation: floatSpline3 12s infinite ease-in-out; animation-delay: -0.25s;" /> <use href="#spline3" style="opacity: 0.85;" /> </g>

      <g transform="translate(200, 150)"> <use href="#wire-cube" stroke="url(#grad-spline1)" style="opacity: 0.15; animation: spinFloat1 20s infinite linear; animation-delay: -0.8s;" /> <use href="#wire-cube" stroke="url(#grad-spline1)" style="opacity: 0.4;  animation: spinFloat1 20s infinite linear; animation-delay: -0.4s;" /> <use href="#wire-cube" stroke="url(#grad-spline1)" style="opacity: 0.9;  animation: spinFloat1 20s infinite linear; animation-delay: 0s;" /> </g>
      <g transform="translate(950, 450) scale(1.2)"> <use href="#wire-tetra" stroke="url(#grad-spline2)" style="opacity: 0.15; animation: spinFloat2 15s infinite linear; animation-delay: -0.6s;" /> <use href="#wire-tetra" stroke="url(#grad-spline2)" style="opacity: 0.4;  animation: spinFloat2 15s infinite linear; animation-delay: -0.3s;" /> <use href="#wire-tetra" stroke="url(#grad-spline2)" style="opacity: 0.9;  animation: spinFloat2 15s infinite linear; animation-delay: 0s;" /> </g>
      <g transform="translate(600, 300) scale(1.5)"> <use href="#wire-cube" stroke="url(#grad-spline3)" style="opacity: 0.15; animation: spinFloat3 25s infinite linear; animation-delay: -1s;" /> <use href="#wire-cube" stroke="url(#grad-spline3)" style="opacity: 0.4;  animation: spinFloat3 25s infinite linear; animation-delay: -0.5s;" /> <use href="#wire-cube" stroke="url(#grad-spline3)" style="opacity: 0.9;  animation: spinFloat3 25s infinite linear; animation-delay: 0s;" /> </g>
      <g transform="translate(150, 450) scale(0.8)"> <use href="#wire-tetra" stroke="url(#grad-shape1)" style="opacity: 0.15; animation: spinFloat2 18s infinite linear; animation-delay: -0.7s;" /> <use href="#wire-tetra" stroke="url(#grad-shape1)" style="opacity: 0.4;  animation: spinFloat2 18s infinite linear; animation-delay: -0.35s;" /> <use href="#wire-tetra" stroke="url(#grad-shape1)" style="opacity: 0.9;  animation: spinFloat2 18s infinite linear; animation-delay: 0s;" /> </g>
      <g transform="translate(1000, 150) scale(0.9)"> <use href="#wire-cube" stroke="url(#grad-shape2)" style="opacity: 0.15; animation: spinFloat1 22s infinite linear; animation-delay: -0.9s;" /> <use href="#wire-cube" stroke="url(#grad-shape2)" style="opacity: 0.4;  animation: spinFloat1 22s infinite linear; animation-delay: -0.45s;" /> <use href="#wire-cube" stroke="url(#grad-shape2)" style="opacity: 0.9;  animation: spinFloat1 22s infinite linear; animation-delay: 0s;" /> </g>
      <g transform="translate(450, 100) scale(0.7)"> <use href="#wire-tetra" stroke="url(#grad-spline1)" style="opacity: 0.15; animation: spinFloat3 16s infinite linear; animation-delay: -0.5s;" /> <use href="#wire-tetra" stroke="url(#grad-spline1)" style="opacity: 0.4;  animation: spinFloat3 16s infinite linear; animation-delay: -0.25s;" /> <use href="#wire-tetra" stroke="url(#grad-spline1)" style="opacity: 0.9;  animation: spinFloat3 16s infinite linear; animation-delay: 0s;" /> </g>
    </g>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />

  <use href="#all-graphics" mask="url(#maskForClearLayer)" />
  <use href="#all-graphics" mask="url(#maskForBlurLayer)" filter="url(#radialBlur)" />

  <g transform="translate(600, 330)" filter="url(#filter-crayon)" font-family="Arial Black, Helvetica, sans-serif" font-size="95" font-weight="900" stroke-width="4" stroke-linejoin="round" text-anchor="middle">
    
    <text x="-410" class="animate-letter" style="animation-delay: 0.0s" fill="url(#text-orange)" stroke="#B45309">R</text>
    <text x="-330" class="animate-letter" style="animation-delay: 0.2s" fill="url(#text-purple)" stroke="#6D28D9">E</text>
    <text x="-240" class="animate-letter" style="animation-delay: 0.4s" fill="url(#text-pink)"   stroke="#D81B60">M</text>
    <text x="-150" class="animate-letter" style="animation-delay: 0.6s" fill="url(#text-cyan)"   stroke="#0E7490">N</text>
    <text x="-65"  class="animate-letter" style="animation-delay: 0.8s" fill="url(#text-purple)" stroke="#6D28D9">A</text>
    <text x="20"   class="animate-letter" style="animation-delay: 1.0s" fill="url(#text-pink)"   stroke="#D81B60">N</text>
    <text x="100"  class="animate-letter" style="animation-delay: 1.2s" fill="url(#text-cyan)"   stroke="#0E7490">T</text>
    
    <text x="210"  class="animate-letter" style="animation-delay: 1.4s" fill="url(#text-orange)" stroke="#B45309">S</text>
    <text x="295"  class="animate-letter" style="animation-delay: 1.6s" fill="url(#text-pink)"   stroke="#D81B60">O</text>
    <text x="385"  class="animate-letter" style="animation-delay: 1.8s" fill="url(#text-purple)" stroke="#6D28D9">N</text>
    <text x="475"  class="animate-letter" style="animation-delay: 2.0s" fill="url(#text-cyan)"   stroke="#0E7490">G</text>
    
  </g>

</svg>
