<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" />
    </filter>

    <style>
      /* ====================================== */
      /* 🔥 1. 魔法阵：原生 CSS 高速生长动画 */
      /* ====================================== */
      .magic-draw {
        stroke-linecap: round;
        stroke-linejoin: round;
        /* 将长度设大，初始完全偏移隐藏 */
        stroke-dasharray: 4000;
        stroke-dashoffset: 4000;
        /* 2.5秒内疾速绘制完成，并永远停在完成状态 */
        animation: drawMagic 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes drawMagic {
        100% { stroke-dashoffset: 0; }
      }

      /* ====================================== */
      /* 🔥 2. 台词精准时序控制 */
      /* ====================================== */
      .text-jp {
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        font-size: 22px;
        font-weight: 900;
        fill: #fff;
        opacity: 0; /* 核心：初始完全隐形！ */
        /* 延迟 2.5 秒（魔法阵画完的瞬间），瞬间出现并以2秒为周期无限故障撕裂 */
        animation: glitch-anim 2s 1.5s infinite;
      }
      
      .text-cn {
        font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        font-size: 16px;
        font-weight: bold;
        fill: #6366f1; /* 颜色加深，更易读 */
        opacity: 0;
        /* 2.5秒后淡入，3.0秒后开始平缓呼吸 */
        animation: fadeIn 0.5s 1.5s forwards, pulse 3s 3.0s infinite alternate;
      }
      
      .text-en {
        font-family: "Courier New", monospace;
        font-size: 12px;
        fill: #67e8f9;
        letter-spacing: 3px;
        opacity: 0;
        animation: fadeIn 0.5s 1.5s forwards;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      /* 💡 加速版 2 秒周期故障特效 (白字和光晕同生同死) */
      @keyframes glitch-anim {
        0%, 80%, 90%, 100% { opacity: 1; text-shadow: 0 0 10px #d946ef, 0 0 20px #d946ef; transform: translate(0); }
        82% { opacity: 1; text-shadow: 3px 0 0 #0ff, -3px 0 0 #f0f; transform: translate(-3px, 1px) skewX(-10deg); }
        84% { opacity: 1; text-shadow: -4px 0 0 #0ff, 4px 0 0 #f0f; transform: translate(3px, -2px) skewX(10deg); }
        86% { opacity: 1; text-shadow: 2px 0 0 #0ff, -2px 0 0 #f0f; transform: translate(0px, 2px); }
        88% { opacity: 1; text-shadow: -2px 0 0 #0ff, 2px 0 0 #f0f; transform: translate(-1px, -1px); }
      }

      /* 呼吸灯发光特效 */
      @keyframes pulse {
        0% { text-shadow: 0 0 5px #4f46e5; opacity: 0.8; }
        100% { text-shadow: 0 0 15px #818cf8; opacity: 1; }
      }

      /* GitHub 主题适配：亮色模式下为了保证能看清，将高光层颜色反转为深色 */
      @media (prefers-color-scheme: light) {
        .text-jp { fill: #111; text-shadow: 0 0 5px #d946ef; }
        .text-cn { fill: #3730a3; text-shadow: 0 0 5px #d946ef; }
        .text-en { fill: #0891b2; font-weight: bold; }
        .glow-base { opacity: 0.1 !important; filter: none !important; }
        .glow-mid { opacity: 0.4 !important; }
        .glow-core { stroke: #111827 !important; opacity: 0.7 !important; }
      }
    </style>

    <g id="magic-magenta" fill="none">
      <path class="magic-draw" d="M 0,-120 A 120,120 0 1,1 0,120 A 120,120 0 1,1 0,-120" />
      <path class="magic-draw" d="M 0,-110 A 110,110 0 1,1 0,110 A 110,110 0 1,1 0,-110" />
      <path class="magic-draw" d="M 0,-100 L 86.6,50 L -86.6,50 Z M 0,100 L -86.6,-50 L 86.6,-50 Z" />
      <path class="magic-draw" d="M 0,60 L -51.96,-30 L 51.96,-30 Z M 0,-60 L 51.96,30 L -51.96,30 Z" />
      <path class="magic-draw" d="M 0,-25 A 25,25 0 1,1 0,25 A 25,25 0 1,1 0,-25" />
    </g>

    <g id="magic-cyan" fill="none">
      <path class="magic-draw" d="M -56.56,-56.56 L 56.56,-56.56 L 56.56,56.56 L -56.56,56.56 Z" />
      <path class="magic-draw" d="M 0,-80 L 80,0 L 0,80 L -80,0 Z" />
      <path class="magic-draw" d="M 0,-90 A 90,90 0 1,1 0,90 A 90,90 0 1,1 0,-90" />
      <path class="magic-draw" d="M 0,-110 L 0,110 M -110,0 L 110,0 M -77.78,-77.78 L 77.78,77.78 M -77.78,77.78 L 77.78,-77.78" />
      <path class="magic-draw" d="M 0,-15 L 15,0 L 0,15 L -15,0 Z" />
    </g>
  </defs>

  <g transform="translate(400, 125)">
    <g class="glow-base" filter="url(#blur-glow)">
      <use href="#magic-magenta" stroke="#d946ef" stroke-width="6" opacity="0.35" />
      <use href="#magic-cyan" stroke="#06b6d4" stroke-width="6" opacity="0.35" />
    </g>

    <g class="glow-mid">
      <use href="#magic-magenta" stroke="#d946ef" stroke-width="2" opacity="0.8" />
      <use href="#magic-cyan" stroke="#06b6d4" stroke-width="2" opacity="0.8" />
    </g>

    <g class="glow-core">
      <use href="#magic-magenta" stroke="#ffffff" stroke-width="0.8" opacity="1" />
      <use href="#magic-cyan" stroke="#ffffff" stroke-width="0.8" opacity="1" />
    </g>
  </g>

  <g>
    <text x="50%" y="110" class="text-jp" text-anchor="middle">爆ぜろリアル！弾けろシナプス！ パニッシュメント ディス、ワールド！</text>
    <text x="50%" y="155" class="text-cn" text-anchor="middle">爆裂吧现实！粉碎吧精神！放逐这个世界！</text>
    <text x="50%" y="190" class="text-en" text-anchor="middle">hazero riaru！ hajikero shinapusu！ panisshimento deisu waarudo！</text>
  </g>

</svg>
