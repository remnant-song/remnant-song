<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="100%" height="100%">
  <defs>
    <style>
      :root {
        --bg-color: #fafafa;
        --alpha-base: 0.85;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg-color: #111827;
        }
      }
      
      .bg-rect {
        fill: var(--bg-color);
        transition: fill 0.5s ease;
      }

      /* 动画性能优化 */
      .anim-element {
        will-change: transform;
      }

      /* 流体线条浮动动画 */
      @keyframes floatSpline1 {
        0%, 100% { transform: translateY(0px) scale(1) rotate(0deg); }
        50% { transform: translateY(-30px) scale(1.02) rotate(1deg); }
      }
      @keyframes floatSpline2 {
        0%, 100% { transform: translateY(0px) scale(1) rotate(0deg); }
        50% { transform: translateY(40px) scale(0.98) rotate(-1deg); }
      }
      @keyframes floatSpline3 {
        0%, 100% { transform: translateY(0px) scale(1) rotate(0deg); }
        50% { transform: translateY(-20px) scale(1.05) rotate(0.5deg); }
      }

      /* 几何体 3D 旋转浮动近似动画 (包含位移与旋转) */
      @keyframes spinFloat1 {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        33% { transform: translate(40px, -60px) rotate(120deg) scale(1.1); }
        66% { transform: translate(-30px, 40px) rotate(240deg) scale(0.9); }
        100% { transform: translate(0, 0) rotate(360deg) scale(1); }
      }
      @keyframes spinFloat2 {
        0% { transform: translate(0, 0) rotate(0deg) scale(1); }
        33% { transform: translate(-50px, 30px) rotate(-120deg) scale(0.9); }
        66% { transform: translate(40px, -50px) rotate(-240deg) scale(1.1); }
        100% { transform: translate(0, 0) rotate(-360deg) scale(1); }
      }
      @keyframes spinFloat3 {
        0% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(80px, 80px) rotate(180deg); }
        100% { transform: translate(0, 0) rotate(360deg); }
      }
    </style>

    <linearGradient id="grad-spline1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="100%" stop-color="#9933FF" />
    </linearGradient>
    <linearGradient id="grad-spline2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#00FF7F" />
    </linearGradient>
    <linearGradient id="grad-spline3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB100" />
      <stop offset="100%" stop-color="#FF0055" />
    </linearGradient>
    <linearGradient id="grad-shape1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2CBF" />
      <stop offset="100%" stop-color="#390099" />
    </linearGradient>
    <linearGradient id="grad-shape2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E00" />
      <stop offset="100%" stop-color="#FF5400" />
    </linearGradient>

    <g id="wire-cube" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="-25,-25 25,-25 25,25 -25,25" />
      <polygon points="-12,-37 38,-37 38,13 -12,13" />
      <line x1="-25" y1="-25" x2="-12" y2="-37" />
      <line x1="25" y1="-25" x2="38" y2="-37" />
      <line x1="25" y1="25" x2="38" y2="13" />
      <line x1="-25" y1="25" x2="-12" y2="13" />
    </g>

    <g id="wire-tetra" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="0,-35 -30,18 30,18" />
      <line x1="0" y1="-35" x2="0" y2="5" />
      <line x1="-30" y1="18" x2="0" y2="5" />
      <line x1="30" y1="18" x2="0" y2="5" />
    </g>

    <path id="spline1" d="M -100 300 Q 200 150, 500 350 T 1300 200" fill="none" stroke="url(#grad-spline1)" stroke-width="2"/>
    <path id="spline2" d="M -100 450 Q 300 600, 700 350 T 1300 450" fill="none" stroke="url(#grad-spline2)" stroke-width="2"/>
    <path id="spline3" d="M -100 150 Q 400 -50, 800 250 T 1300 100" fill="none" stroke="url(#grad-spline3)" stroke-width="2"/>
  </defs>

  <rect class="bg-rect" width="100%" height="100%" />

  <g style="animation: floatSpline1 15s infinite ease-in-out;">
    <use href="#spline1" style="opacity: 0.1; animation: floatSpline1 15s infinite ease-in-out; animation-delay: -0.6s;" />
    <use href="#spline1" style="opacity: 0.3; animation: floatSpline1 15s infinite ease-in-out; animation-delay: -0.3s;" />
    <use href="#spline1" style="opacity: 0.85;" />
  </g>

  <g style="animation: floatSpline2 18s infinite ease-in-out;">
    <use href="#spline2" style="opacity: 0.1; animation: floatSpline2 18s infinite ease-in-out; animation-delay: -0.8s;" />
    <use href="#spline2" style="opacity: 0.3; animation: floatSpline2 18s infinite ease-in-out; animation-delay: -0.4s;" />
    <use href="#spline2" style="opacity: 0.85;" />
  </g>

  <g style="animation: floatSpline3 12s infinite ease-in-out;">
    <use href="#spline3" style="opacity: 0.1; animation: floatSpline3 12s infinite ease-in-out; animation-delay: -0.5s;" />
    <use href="#spline3" style="opacity: 0.3; animation: floatSpline3 12s infinite ease-in-out; animation-delay: -0.25s;" />
    <use href="#spline3" style="opacity: 0.85;" />
  </g>

  <g transform="translate(200, 150)">
    <use href="#wire-cube" stroke="url(#grad-spline1)" style="opacity: 0.15; animation: spinFloat1 20s infinite linear; animation-delay: -0.8s;" />
    <use href="#wire-cube" stroke="url(#grad-spline1)" style="opacity: 0.4;  animation: spinFloat1 20s infinite linear; animation-delay: -0.4s;" />
    <use href="#wire-cube" stroke="url(#grad-spline1)" style="opacity: 0.9;  animation: spinFloat1 20s infinite linear; animation-delay: 0s;" />
  </g>

  <g transform="translate(950, 450) scale(1.2)">
    <use href="#wire-tetra" stroke="url(#grad-spline2)" style="opacity: 0.15; animation: spinFloat2 15s infinite linear; animation-delay: -0.6s;" />
    <use href="#wire-tetra" stroke="url(#grad-spline2)" style="opacity: 0.4;  animation: spinFloat2 15s infinite linear; animation-delay: -0.3s;" />
    <use href="#wire-tetra" stroke="url(#grad-spline2)" style="opacity: 0.9;  animation: spinFloat2 15s infinite linear; animation-delay: 0s;" />
  </g>

  <g transform="translate(600, 300) scale(1.5)">
    <use href="#wire-cube" stroke="url(#grad-spline3)" style="opacity: 0.15; animation: spinFloat3 25s infinite linear; animation-delay: -1s;" />
    <use href="#wire-cube" stroke="url(#grad-spline3)" style="opacity: 0.4;  animation: spinFloat3 25s infinite linear; animation-delay: -0.5s;" />
    <use href="#wire-cube" stroke="url(#grad-spline3)" style="opacity: 0.9;  animation: spinFloat3 25s infinite linear; animation-delay: 0s;" />
  </g>

  <g transform="translate(150, 450) scale(0.8)">
    <use href="#wire-tetra" stroke="url(#grad-shape1)" style="opacity: 0.15; animation: spinFloat2 18s infinite linear; animation-delay: -0.7s;" />
    <use href="#wire-tetra" stroke="url(#grad-shape1)" style="opacity: 0.4;  animation: spinFloat2 18s infinite linear; animation-delay: -0.35s;" />
    <use href="#wire-tetra" stroke="url(#grad-shape1)" style="opacity: 0.9;  animation: spinFloat2 18s infinite linear; animation-delay: 0s;" />
  </g>

  <g transform="translate(1000, 150) scale(0.9)">
    <use href="#wire-cube" stroke="url(#grad-shape2)" style="opacity: 0.15; animation: spinFloat1 22s infinite linear; animation-delay: -0.9s;" />
    <use href="#wire-cube" stroke="url(#grad-shape2)" style="opacity: 0.4;  animation: spinFloat1 22s infinite linear; animation-delay: -0.45s;" />
    <use href="#wire-cube" stroke="url(#grad-shape2)" style="opacity: 0.9;  animation: spinFloat1 22s infinite linear; animation-delay: 0s;" />
  </g>
  
  <g transform="translate(450, 100) scale(0.7)">
    <use href="#wire-tetra" stroke="url(#grad-spline1)" style="opacity: 0.15; animation: spinFloat3 16s infinite linear; animation-delay: -0.5s;" />
    <use href="#wire-tetra" stroke="url(#grad-spline1)" style="opacity: 0.4;  animation: spinFloat3 16s infinite linear; animation-delay: -0.25s;" />
    <use href="#wire-tetra" stroke="url(#grad-spline1)" style="opacity: 0.9;  animation: spinFloat3 16s infinite linear; animation-delay: 0s;" />
  </g>

</svg>
