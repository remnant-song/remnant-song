permissions:
  contents: write

name: Update README cards

on:
  schedule: # 每天运行一次
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }} # 核心：用你的私人令牌

      # 生成统计卡片
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      # 生成语言卡片
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=transparent
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      # 提交并推送
      - name: Commit cards
        run: |
          git config user.name "remnant-song"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
