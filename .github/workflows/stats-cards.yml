permissions:
  contents: write

name: Update README cards

on:
  schedule: # 每天运行一次
    - cron: "0 0 * * *"
  workflow_dispatch:
  # 本文件修改时触发
  push:
    branches:
      - main
    paths:
      - .github/workflows/stats-cards.yml
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # 生成统计数据卡片：透明主题，隐藏边框
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=transparent&hide_border=true&hide_rank
          path: profile/stats.svg
          token: ${{ secrets.GH_PAT }}

      # 生成语言分布卡片：透明主题，紧凑布局，隐藏边框，langs_count显示语言数量
      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=transparent&hide_border=true&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GH_PAT }}

      - name: Commit cards
        run: |
          git config user.name "remnant-song"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
